services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mi_password
      MONGO_INITDB_DATABASE: mi_base_datos
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: